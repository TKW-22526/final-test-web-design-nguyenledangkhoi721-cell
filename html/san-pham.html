<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Cửa hàng Xe máy Kawasaki Motors</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <div class="top-bar text-white py-2 d-none d-md-block" style="background-color: #1a1a1a;">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <span class="badge bg-danger text-uppercase px-2 py-1" style="font-size: 11px; font-weight: bold;">Hot News</span>
                <span class="small text-white-50 m-0">Siêu phẩm Kawasaki Ninja ZX-25R 4 máy chính thức cập bến - Âm thanh uy lực...</span>
            </div>
            <div class="d-flex gap-3 text-white-50 small">
                <span><i class="bi bi-facebook"></i> Facebook</span>
                <span><i class="bi bi-envelope-fill"></i> Gmail</span>
            </div>
        </div>
    </div>

    <header class="bg-dark text-white py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="text-white text-decoration-none d-flex align-items-center gap-2">
                <span class="fs-4 fw-bold tracking-wide text-uppercase">Kawasaki Motors Store</span>
            </a>

            <div class="w-50 mx-3 d-none d-md-block">
                <div class="input-group">
                    <input type="text" class="form-control bg-secondary text-white border-0" placeholder="Tìm kiếm siêu mô tô, nakedbike, classic...">
                    <button class="btn btn-outline-light border-0 bg-secondary" type="button">🔍</button>
                </div>
            </div>

            <a href="gio-hang.html" class="text-white text-decoration-none position-relative d-flex align-items-center gap-2">
                <div class="position-relative">
                    <span class="fs-4">🛒</span>
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem;">0</span>
                </div>
                <span class="d-none d-sm-inline ms-1">Giỏ hàng</span>
            </a>
        </div>
    </header>

    <div class="container mb-5 mt-4">
        <h2 class="mb-4 fw-bold text-dark border-bottom pb-2">Danh mục sản phẩm</h2>

        <div class="mb-4 d-flex gap-2 flex-wrap">
            <button class="btn btn-dark active" onclick="filterData('all')">Tất cả xe</button>
            <button class="btn btn-outline-dark" onclick="filterData('kawasaki_all')">Tất cả xe Kawasaki</button>
            <button class="btn btn-outline-success" onclick="filterData('xe_gia_re')">Dòng xe phổ thông dưới 200Tr</button>
            
            
            <hr class="w-100 d-none d-md-block my-1 border-0"> 
            
            <button class="btn btn-outline-secondary" onclick="filterData('superbike')">Phân khúc Superbike</button>
            <button class="btn btn-primary" onclick="filterData('nakedbike')">Phân khúc Nakedbike</button>
            <button class="btn btn-success" onclick="filterData('classic_adventure')">Classic & Adventure</button>
        </div>

        <div class="product-list row row-cols-2 row-cols-md-4 g-3" id="product-list">
        </div>
    </div>

    <script>
        // Hàm hiển thị mặc định tất cả sản phẩm khi tải trang
        function renderDefault() {
            const container = document.getElementById("product-list");
            if (!container) return;
            container.innerHTML = ""; 
            
            if (typeof productlist !== 'undefined') {
                productlist.forEach(function(item){
                    addproduct(item.id, item.name, item.price, item.image, item.productLink);
                });
            }
        }

        // Hàm xử lý lọc dữ liệu đồng bộ theo mảng xe máy mới
        function filterData(type) {
            const container = document.getElementById("product-list");
            if (!container || typeof productlist === 'undefined') return;
            container.innerHTML = "";
            
            productlist.forEach(function(item) {
                // Chuyển đổi giá chuỗi "520.000.000 VNĐ" thành số để lọc giá dễ dàng
                let numericPrice = parseInt(item.price.replace(/\./g, '').replace(' VNĐ', ''));

                if (type === 'all') {
                    addproduct(item.id, item.name, item.price, item.image, item.productLink);
                } 
                else if (type === 'kawasaki_all' && item.system === 'kawasaki') {
                    addproduct(item.id, item.name, item.price, item.image, item.productLink);
                } 
                else if (type === 'xe_gia_re' && numericPrice <= 200000000) {
                    addproduct(item.id, item.name, item.price, item.image, item.productLink);
                } 
                else if (type === 'vespa_dior' && item.system === 'vespa') {
                    addproduct(item.id, item.name, item.price, item.image, item.productLink);
                } 
                else if (type === 'superbike' && item.cat === 'superbike') {
                    addproduct(item.id, item.name, item.price, item.image, item.productLink);
                } 
                else if (type === 'nakedbike' && item.cat === 'nakedbike') {
                    addproduct(item.id, item.name, item.price, item.image, item.productLink);
                } 
                else if (type === 'classic_adventure' && (item.cat === 'classic' || item.cat === 'adventure')) {
                    addproduct(item.id, item.name, item.price, item.image, item.productLink);
                }
            });
        }

        // Đợi ứng dụng sẵn sàng và gán sự kiện đổi class active nút bấm
        window.onload = function() {
            renderDefault();
            
            if (typeof updateCartBadge === 'function') {
                updateCartBadge();
            }

            const filterButtons = document.querySelectorAll('.mb-4 .btn');
            filterButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        };
    </script>
</body>
</html>

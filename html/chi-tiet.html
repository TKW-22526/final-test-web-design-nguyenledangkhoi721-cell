<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Chi tiết sản phẩm -KaWaSaKi Store</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <script src="../js/script.js"></script>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <div class="top-bar text-white py-2 d-none d-md-block" style="background-color: #1a1a1a; font-size: 13px;">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <span class="badge bg-danger text-uppercase px-2 py-1" style="font-size: 11px; font-weight: bold;">Hot News</span>
                <span class="small text-white-50 m-0">Siêu phẩm Kawasaki Ninja ZX-25R 4 máy chính thức cập bến - Âm thanh uy lực...</span>
            </div>
            <div class="d-flex gap-3 text-white-50 small">
                <span><i class="bi bi-facebook"></i> Facebook</span>
                <span><i class="bi bi-envelope-fill"></i> Gmail</span>
            </div>
        </div>
    </div>

    <header class="bg-dark text-white py-3 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="../index.html" class="text-white text-decoration-none d-flex align-items-center gap-2">
                <span class="fs-4 fw-bold tracking-wide">KaWaSaKi STORE</span>
            </a>

            <div class="w-50 mx-3 d-none d-md-block">
                <div class="input-group">
                    <input type="text" class="form-control bg-secondary text-white border-0" placeholder="Tìm kiếm siêu mô tô, nakedbike, classic...">
                    <button class="btn btn-outline-light border-0 bg-secondary" type="button">🔍</button>
                </div>
            </div>

            <a href="gio-hang.html" class="text-white text-decoration-none position-relative d-flex align-items-center gap-2">
                <div class="position-relative">
                    <span class="fs-4">🛒</span>
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem;">0</span>
                </div>
                <span class="d-none d-sm-inline ms-1">Giỏ hàng</span>
            </a>
        </div>
    </header>

    <div class="container mt-4 mb-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-4">
                <li class="breadcrumb-item"><a href="../index.html" class="text-decoration-none text-secondary">Trang chủ</a></li>
                <li class="breadcrumb-item"><a href="san-pham.html" class="text-decoration-none text-secondary">Sản phẩm</a></li>
                <li class="breadcrumb-item active text-dark fw-medium" aria-current="page">Chi tiết sản phẩm</li>
            </ol>
        </nav>

        <div class="row g-4 align-items-start">
            <div class="col-md-6 text-center">
                <div class="p-3 border rounded shadow-sm bg-white ratio ratio-1x1 overflow-hidden" style="max-width: 450px; margin: 0 auto;">
                    <img id="detail-img" src="" class="img-fluid object-fit-contain p-2" alt="Sản phẩm">
                </div>
            </div>
            
            <div class="col-md-6">
                <h1 id="detail-name" class="fw-bold text-dark h2 mb-2">Tên sản phẩm</h1>
                
                <div class="d-flex align-items-center gap-3 my-3">
                    <span id="detail-price" class="text-danger fw-bold fs-3">Đơn giá</span>
                    <span id="detail-old-price" class="text-muted text-decoration-line-through small"></span>
                </div>
                
                <hr class="text-secondary opacity-25">
                
                <h4 class="h6 fw-bold text-uppercase tracking-wider text-secondary mb-2">Mô tả sản phẩm</h4>
                <p id="detail-desc" class="text-secondary text-justify" style="line-height: 1.7; font-size: 15px;">Nội dung mô tả sản phẩm đang được tải...</p>
                
                <div class="mt-4 pt-2 d-flex gap-2">
                    <button onclick="history.back()" class="btn btn-outline-secondary px-4"><i class="bi bi-arrow-left"></i> Quay lại</button>
                    <button id="add-to-cart-btn" class="btn btn-danger flex-grow-1 fw-bold text-uppercase py-2 shadow-sm">
                        <i class="bi bi-cart-plus-fill me-2"></i> Thêm

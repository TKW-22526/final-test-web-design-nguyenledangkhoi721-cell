<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Trang chủ - Kawasaki Motors Store</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/script.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Top Bar -->
    <div class="top-bar text-white py-2 d-none d-md-block" style="background-color: #111111; font-size: 13px;">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <span class="badge bg-success text-uppercase px-2 py-1" style="font-size: 11px; font-weight: bold; background-color: #00e600 !important;">Hot News</span>
                <span class="small text-white-50 m-0">Kawasaki Ninja ZX-10R 2026 chính thức cập bến - Đặt hàng ngay nhận ưu đãi lớn...</span>
            </div>
            <div class="d-flex gap-3 text-white-50 small">
                <span><i class="bi bi-facebook"></i> Facebook</span>
                <span><i class="bi bi-envelope-fill"></i> Gmail</span>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-dark text-white py-3 shadow-sm border-bottom border-success" style="border-width: 3px !important;">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="text-white text-decoration-none d-flex align-items-center gap-2">
                <!-- Thêm màu xanh lá đặc trưng của Kawasaki vào chữ STORE -->
                <span class="fs-4 fw-bold tracking-wide">KAWASAKI <span style="color: #00e600;">STORE</span></span>
            </a>

            <div class="w-50 mx-3 d-none d-md-block">
                <div class="input-group">
                    <input type="text" class="form-control bg-secondary text-white border-0" placeholder="Tìm kiếm dòng xe, phụ tùng, đồ bảo hộ Kawasaki...">
                    <button class="btn btn-outline-light border-0 bg-secondary" type="button">🔍</button>
                </div>
            </div>

            <a href="html/gio-hang.html" class="text-white text-decoration-none position-relative d-flex align-items-center gap-2">
                <div class="position-relative">
                    <span class="fs-4">🛒</span>
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem;">0</span>
                </div>
                <span class="d-none d-sm-inline ms-1">Đơn đặt hàng</span>
            </a>
        </div>
    </header>

    <!-- Hero Banner -->
    <!-- Bạn có thể thay ảnh banner 'kawasaki-banner.jpg' vào thư mục assets/images/ nếu có -->
    <div class="bg-dark text-white text-center py-5 mb-5" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('assets/images/kawasaki-banner.jpg') center/cover; background-color: #1a1a1a;">
        <div class="container py-5">
            <h1 class="display-4 fw-bold tracking-wide">KAWASAKI MOTORS</h1>
            <p class="lead font-monospace text-uppercase" style="color: #00e600; letter-spacing: 2px;">Khám phá thế giới tốc độ & Bản lĩnh dẫn đầu</p>
            <a href="html/san-pham.html" class="btn btn-success btn-lg mt-3 fw-bold text-uppercase px-4" style="background-color: #00e600; border: none;">Xem tất cả dòng xe</a>
        </div>
    </div>

    <!-- Danh sách sản phẩm -->
    <div class="container mb-5">
        <h2 class="text-center fw-bold mb-4 text-uppercase text-dark position-relative">Siêu xe nổi bật</h2>
        
        <div class="product-list row row-cols-2 row-cols-md-4 g-3" id="product-list">
            <!-- Sản phẩm sẽ được đổ tự động từ file script.js vào đây -->
        </div>
    </div>

    <!-- Script điều hướng & hiển thị -->
    <script>
        // Sử dụng window.onload để chắc chắn file js/script.js đã nạp xong hoàn toàn
        window.onload = function() {
            // 1. Đồng bộ số lượng giỏ hàng trên Header ngay khi mở trang chủ
            if (typeof updateCartBadge === 'function') {
                updateCartBadge();
            }

            // 2. Xử lý sửa đường dẫn ảnh và liên kết cho 4 xe nổi bật
            const container = document.getElementById("product-list");
            if (container && typeof productlist !== 'undefined') {
                container.innerHTML = ""; // Xóa dữ liệu cũ

                const topProducts = productlist.slice(0, 4); // Lấy đúng 4 chiếc xe đầu tiên trong mảng

                topProducts.forEach(function(item) {
                    // Cắt chữ "../" đi vì index.html đang đứng ở thư mục gốc ngoài cùng
                    let fixImage = item.image.replace("../", ""); 
                    let fixLink = "html/" + item.productLink;

                    // Gọi hàm sinh thẻ sản phẩm từ file script.js
                    addproduct(item.id, item.name, item.price, fixImage, fixLink);
                });
            }
        };
    </script>
</body>
</html>
